services:
  postgres:
    image: postgres:17-alpine
    container_name: movies-todo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movies_todo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movies_todo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
